<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div class="names">
      <input type="text" id="nameX" value="Player X" maxlength="20" spellcheck="false">
      <span class="vs">vs</span>
      <input type="text" id="nameO" value="Player O" maxlength="20" spellcheck="false">
    </div>
    <div class="status" id="status">Player X's turn</div>
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
      <canvas id="winCanvas"></canvas>
    </div>
    <div class="score" id="score">X: 0 | O: 0</div>
    <button class="reset" id="reset">New Game</button>
    <button class="reset reset-score" id="resetScore">Reset Score</button>
    <div class="history" id="history">
      <div class="history-header">
        <h2>Game History</h2>
        <button class="reset clear-history" id="clearHistory">Clear</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
