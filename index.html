<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-buttons">
    <button class="top-btn mute-toggle" id="muteToggle" aria-label="Toggle sound">🔊</button>
    <button class="top-btn theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
  </div>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div class="names">
      <input type="text" id="nameX" value="Player X" maxlength="20" spellcheck="false">
      <span class="vs">vs</span>
      <input type="text" id="nameO" value="Player O" maxlength="20" spellcheck="false">
    </div>
    <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true">Player X's turn</div>
    <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board">
      <div class="cell" data-index="0" role="gridcell" tabindex="0" aria-label="Row 1, Column 1, empty"></div>
      <div class="cell" data-index="1" role="gridcell" tabindex="-1" aria-label="Row 1, Column 2, empty"></div>
      <div class="cell" data-index="2" role="gridcell" tabindex="-1" aria-label="Row 1, Column 3, empty"></div>
      <div class="cell" data-index="3" role="gridcell" tabindex="-1" aria-label="Row 2, Column 1, empty"></div>
      <div class="cell" data-index="4" role="gridcell" tabindex="-1" aria-label="Row 2, Column 2, empty"></div>
      <div class="cell" data-index="5" role="gridcell" tabindex="-1" aria-label="Row 2, Column 3, empty"></div>
      <div class="cell" data-index="6" role="gridcell" tabindex="-1" aria-label="Row 3, Column 1, empty"></div>
      <div class="cell" data-index="7" role="gridcell" tabindex="-1" aria-label="Row 3, Column 2, empty"></div>
      <div class="cell" data-index="8" role="gridcell" tabindex="-1" aria-label="Row 3, Column 3, empty"></div>
      <canvas id="winCanvas" aria-hidden="true"></canvas>
    </div>
    <div class="score" id="score">X: 0 | O: 0</div>
    <button class="reset" id="reset" aria-label="Start a new game">New Game</button>
    <button class="reset reset-score" id="resetScore" aria-label="Reset score">Reset Score</button>
    <div class="history" id="history">
      <div class="history-header">
        <h2>Game History</h2>
        <button class="reset clear-history" id="clearHistory" aria-label="Clear game history">Clear</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
