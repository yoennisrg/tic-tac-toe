<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-buttons">
    <button class="top-btn mute-toggle" id="muteToggle" aria-label="Toggle sound">🔊</button>
    <button class="top-btn theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
  </div>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>
    <div class="names">
      <input type="text" id="nameX" value="Player X" maxlength="20" spellcheck="false">
      <span class="vs">vs</span>
      <input type="text" id="nameO" value="Player O" maxlength="20" spellcheck="false">
    </div>
    <div class="turn-indicator" id="turnIndicator">
      <div class="player-indicator active" data-player="X">
        <div class="player-token">
          <svg viewBox="0 0 100 100"><line x1="20" y1="20" x2="80" y2="80"/><line x1="80" y1="20" x2="20" y2="80"/></svg>
        </div>
        <div class="player-label" id="labelX">Player X</div>
        <span class="winner-badge">✓</span>
      </div>
      <div class="player-indicator" data-player="O">
        <div class="player-token">
          <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30"/></svg>
        </div>
        <div class="player-label" id="labelO">Player O</div>
        <span class="winner-badge">✓</span>
      </div>
    </div>
    <div class="turn-subtitle" id="turnSubtitle">Player X's turn</div>
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
      <canvas id="winCanvas"></canvas>
    </div>
    <div class="score" id="score">X: 0 | O: 0</div>
    <button class="reset" id="reset">New Game</button>
    <button class="reset reset-score" id="resetScore">Reset Score</button>
    <div class="history" id="history">
      <div class="history-header">
        <h2>Game History</h2>
        <button class="reset clear-history" id="clearHistory">Clear</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
