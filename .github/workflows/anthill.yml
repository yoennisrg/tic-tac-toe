name: Anthill

on:
  issues:
    types: [labeled]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: yoennisrg/anthill-action/on-issue@v0.2.9
        with:
          label: ready-for-dev
          repository: ${{ github.repository }}
          branch: main
          github_token: ${{ secrets.ANTHILL_GITHUB_TOKEN }}
          opencode_api_key: ${{ secrets.OPENCODE_API_KEY }}
          brave_api_key: ${{ secrets.BRAVE_API_KEY }}
