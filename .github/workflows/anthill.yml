name: Anthill

on:
  schedule:
    - cron: '0 * * * *'   # poll Intent every hour
  workflow_dispatch:         # manual trigger for testing

jobs:
  poll:
    name: Poll Intent
    runs-on: ubuntu-latest
    steps:
      - uses: yoennisrg/anthill-action@main
        with:
          client_id: ${{ secrets.ANTHILL_CLIENT_ID }}
          client_secret: ${{ secrets.ANTHILL_CLIENT_SECRET }}
