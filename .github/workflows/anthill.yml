name: Anthill

on:
  schedule:
    - cron: '*/5 * * * *'   # poll Intent every 5 minutes
  workflow_dispatch:         # manual trigger for testing

jobs:
  poll:
    name: Poll Intent
    runs-on: ubuntu-latest
    steps:
      - uses: yoennisrg/anthill-action@main
        with:
          intent_url: ${{ secrets.ANTHILL_INTENT_URL }}
          client_id: ${{ secrets.ANTHILL_CLIENT_ID }}
          github_token: ${{ secrets.ANTHILL_GITHUB_TOKEN }}
          opencode_api_key: ${{ secrets.OPENCODE_API_KEY }}
          brave_api_key: ${{ secrets.BRAVE_API_KEY }}
          branch: main
          merge: manual
